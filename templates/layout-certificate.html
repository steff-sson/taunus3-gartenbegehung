<!DOCTYPE html>
<html lang="de">
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='custom.css') }}">
  <title>Taunusg&auml;rten Anlage 3: Gartenbegehung</title>
  
  <style>
    /* PDF-specific styles */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.4;
      color: #212121;
      max-width: 700px;
      margin: 0 auto;
      padding: 20mm 15mm;
      background: white;
    }
    
    .pdf-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #2E7D32;
    }
    
    .pdf-date {
      font-size: 11pt;
    }
    
    .pdf-parzelle {
      font-size: 12pt;
      font-weight: bold;
    }
    
    h1 {
      font-size: 18pt;
      color: #2E7D32;
      margin-bottom: 15px;
    }
    
    h2 {
      font-size: 12pt;
      color: #2E7D32;
      margin-top: 12px;
      margin-bottom: 6px;
      padding-bottom: 3px;
      border-bottom: 1px solid #E0E0E0;
    }
    
    p {
      font-size: 10pt;
      margin-bottom: 6px;
    }
    
    ul {
      margin-left: 15px;
      margin-bottom: 10px;
    }
    
    li {
      font-size: 10pt;
      margin-bottom: 3px;
    }
    
    section {
      margin-bottom: 12px;
    }
    
    section.legal {
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #BDBDBD;
    }
    
    section.legal h2 {
      font-size: 10pt;
      border-bottom: none;
      margin-bottom: 4px;
    }
    
    section.legal p {
      font-size: 9pt;
      color: #424242;
    }
    
    footer {
      margin-top: 20px;
      padding-top: 10px;
      border-top: 1px solid #BDBDBD;
    }
    
    footer p {
      font-size: 9pt;
    }
    
    .signature {
      margin-top: 20px;
    }
    
    .board {
      margin-top: 10px;
      font-size: 8pt;
      color: #616161;
    }
    
    @media print {
      body {
        padding: 0;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  {% block content %}
  {% endblock %}
</body>
</html>
