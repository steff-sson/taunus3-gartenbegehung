<!DOCTYPE html>
<html lang="de">
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='custom.css') }}">
  <title>Taunusg&auml;rten Anlage 3: Gartenbegehung</title>
  
  <style>
    /* PDF-specific styles */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 10pt;
      line-height: 1.3;
      color: #212121;
      max-width: 700px;
      margin: 0 auto;
      padding: 15mm 12mm;
      background: white;
    }
    
    .pdf-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #009688;
    }
    
    .pdf-top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #009688;
      padding: 12px 15px;
      margin: -15mm -12mm 15px -12mm;
    }
    
    .pdf-top-title {
      font-size: 16pt;
      font-weight: bold;
      color: white;
    }
    
    .pdf-logo {
      height: 38px;
      width: auto;
    }
    
    .pdf-date {
      font-size: 10pt;
    }
    
    .pdf-parzelle {
      font-size: 11pt;
      font-weight: bold;
    }
    
    h1 {
      font-size: 16pt;
      color: #009688;
      margin-bottom: 10px;
    }
    
    h2 {
      font-size: 11pt;
      color: #009688;
      margin-top: 8px;
      margin-bottom: 4px;
      padding-bottom: 2px;
      border-bottom: 1px solid #E0E0E0;
    }
    
    p {
      font-size: 9pt;
      margin-bottom: 4px;
    }
    
    ul {
      margin-left: 12px;
      margin-bottom: 6px;
    }
    
    li {
      font-size: 9pt;
      margin-bottom: 2px;
    }
    
    section {
      margin-bottom: 8px;
    }
    
    section.legal {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #BDBDBD;
    }
    
    section.legal h2 {
      font-size: 9pt;
      border-bottom: none;
      margin-bottom: 3px;
    }
    
    section.legal p {
      font-size: 8pt;
      color: #424242;
    }
    
    footer {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #BDBDBD;
    }
    
    footer p {
      font-size: 8pt;
    }
    
    .signature {
      margin-top: 12px;
    }
    
    .board {
      margin-top: 6px;
      font-size: 7pt;
      color: #616161;
    }
    
    @media print {
      body {
        padding: 0;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="pdf-top-header">
    <span class="pdf-top-title">KGV Taunusg&auml;rten Anlage 3</span>
    <img src="file:///home/stef/github/taunus3-gartenbegehung/static/taunus3-small.png" alt="Logo" class="pdf-logo">
  </div>
  {% block content %}
  {% endblock %}
</body>
</html>
